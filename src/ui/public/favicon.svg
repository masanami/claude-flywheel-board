<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="claude-flywheel-board">
  <!--
    オリジナルの「スパークル」モチーフ（自作）。
    Anthropic 公式ロゴ（6方向の角丸バーからなるアスタリスク）とは意図的に
    形状・配色を変え、直線エッジの4方向スター（凹み型ダイヤモンド。
    Material Design の auto_awesome 等、AIツール全般で汎用的に使われる表現）
    ＋副次的な小スパークルにしている。複製・流用ではない。
    背景は不透明な円塗り（バイオレット〜インディゴのグラデーション）とし、
    ブラウザタブがライト/ダークいずれの配色でも一定のコントラストで
    視認できるようにしている。
  -->
  <defs>
    <linearGradient id="bg" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D4AFF" />
      <stop offset="1" stop-color="#2E1F73" />
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="15" fill="url(#bg)" />
  <path
    d="M16,5 L18.47,13.53 L27,16 L18.47,18.47 L16,27 L13.53,18.47 L5,16 L13.53,13.53 Z"
    fill="#FDF8F3"
  />
  <path
    d="M25,5 L25.71,7.29 L28,8 L25.71,8.71 L25,11 L24.29,8.71 L22,8 L24.29,7.29 Z"
    fill="#FDF8F3"
  />
</svg>
